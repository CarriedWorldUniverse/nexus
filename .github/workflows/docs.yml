name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install MkDocs Material
        run: pip install mkdocs-material

      - name: Sync repo pages from live READMEs
        # Each docs/repos/<repo>.md is regenerated from that repo's live
        # README.md so the published page is always the repo's own source of
        # truth. Committed stubs are the fallback if a fetch fails.
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/sync-repo-readmes.sh

      - name: Build site
        # No --strict: nexus/docs has 30+ spec files we don't bother
        # individually navigating; they still render and link from
        # specs/index.md. Warnings about non-nav pages aren't fatal.
        run: mkdocs build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
