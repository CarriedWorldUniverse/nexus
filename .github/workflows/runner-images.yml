name: Runner images (CLI version rebuild)

# M1 Unit 7, Part C (PHASE2-DESIGN §7 "CLI version strategy"). Builds the
# builder/runner image (deploy/worker/Dockerfile) pinned to a specific
# @anthropic-ai/claude-code release, multi-arch (amd64 + arm64 — robo-dog is
# arm64), tags it runner:cli-<ver>, and pre-loads it onto every cluster node's
# containerd so dispatch Jobs can keep imagePullPolicy: Never (see
# .github/workflows/README-runner-images.md for the full PullNever
# node-distribution rationale + the §7 knob + §6 auth-source docs).
#
# This workflow is a DOCUMENTED DELIVERABLE (§7 build spec Part C says "it
# doesn't need to run") — it is NOT wired to real secrets/hosts in this repo
# state. Before enabling: set the repo secrets listed under "Required
# secrets" below and confirm GHCR + node SSH access.

on:
  workflow_dispatch:
    inputs:
      claude_code_version:
        description: 'npm dist-tag or exact version of @anthropic-ai/claude-code to bake in (e.g. "2.1.3" or "latest")'
        required: true
        default: 'latest'
      distribute:
        description: 'Pre-load the built image onto cluster nodes after push (dMon + robo-dog)'
        type: boolean
        default: true
  schedule:
    # Weekly check for a new claude-code release; the build job below is a
    # no-op (skip: true output) when the resolved version hasn't changed
    # since the last successful run, so this doesn't spam rebuilds.
    - cron: '17 3 * * 1'

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/nexus-runner

permissions:
  contents: read
  packages: write

jobs:
  resolve-version:
    name: resolve claude-code version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      skip: ${{ steps.resolve.outputs.skip }}
    steps:
      - name: resolve npm dist-tag to an exact version
        id: resolve
        run: |
          set -euo pipefail
          WANT="${{ github.event.inputs.claude_code_version || 'latest' }}"
          VER="$(npm view @anthropic-ai/claude-code@"${WANT}" version)"
          echo "resolved @anthropic-ai/claude-code -> ${VER}"
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          # On the scheduled trigger only, skip the rebuild if this version's
          # tag already exists in GHCR (avoids a weekly no-op rebuild+push).
          if [ "${{ github.event_name }}" = "schedule" ]; then
            if docker manifest inspect "${IMAGE}:cli-${VER}" >/dev/null 2>&1; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  build-push:
    name: build + push (multi-arch)
    needs: resolve-version
    if: needs.resolve-version.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true

      # The Dockerfile COPYs prebuilt nexus binaries + cw rather than
      # compiling in-image (deploy/worker/build.sh's host-build pattern —
      # cw is a private module, easier to auth once on the CI runner than
      # inside a container build). Cross-compiled per target arch so the
      # multi-arch manifest below carries native binaries, not qemu-emulated
      # Go toolchain output.
      - name: build nexus binaries (amd64 + arm64)
        run: |
          set -euo pipefail
          mkdir -p deploy/worker/ctx/amd64 deploy/worker/ctx/arm64
          for arch in amd64 arm64; do
            for b in agentfunnel nexus-issue-mcp nexus-jira-mcp nexus-comms-mcp; do
              GOOS=linux GOARCH="${arch}" go build -o "deploy/worker/ctx/${arch}/${b}" "./runtime/cmd/${b}"
            done
          done

      - name: build cw (private module)
        env:
          GH_TOKEN: ${{ secrets.NEXUS_CW_PAT }}
        run: |
          set -euo pipefail
          git clone --depth 1 https://x-access-token:${GH_TOKEN}@github.com/CarriedWorldUniverse/cw /tmp/cw-src
          for arch in amd64 arm64; do
            ( cd /tmp/cw-src && GOOS=linux GOARCH="${arch}" go build -o "${GITHUB_WORKSPACE}/deploy/worker/ctx/${arch}/cw" ./cmd/cw )
          done

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build + push runner:cli-<ver> (linux/amd64, linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: deploy/worker
          file: deploy/worker/Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            CLAUDE_CODE_VERSION=${{ needs.resolve-version.outputs.version }}
          push: true
          tags: |
            ${{ env.IMAGE }}:cli-${{ needs.resolve-version.outputs.version }}
            ${{ env.IMAGE }}:latest

  distribute:
    name: pre-load onto cluster nodes (PullNever)
    needs: [resolve-version, build-push]
    if: ${{ github.event.inputs.distribute != 'false' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - node: dmon
            arch: amd64
            host_secret: DMON_SSH_HOST
          - node: robo-dog
            arch: arm64
            host_secret: ROBODOG_SSH_HOST
    steps:
      # PullNever means the pod spec never asks containerd to reach a
      # registry at dispatch time (sovereignty: no runtime dependency on
      # GHCR) — so distribution here means pre-loading the image straight
      # into each node's k3s containerd namespace, once, from CI. This job
      # documents that step; it is NOT wired to live SSH secrets in this
      # repo state (see README "Required secrets" + "Enabling this for
      # real").
      - name: ctr image pull (native arch, direct from GHCR) + verify tag
        env:
          SSH_HOST: ${{ secrets[matrix.host_secret] }}
          SSH_KEY: ${{ secrets.NODE_DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SSH_HOST}" ]; then
            echo "::notice::${{ matrix.node }} SSH secret unset — skipping live distribution (documented deliverable only)."
            exit 0
          fi
          install -m 600 /dev/stdin ~/.ssh/id_ed25519 <<< "${SSH_KEY}"
          ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/id_ed25519 "jacinta@${SSH_HOST}" \
            "sudo k3s ctr images pull --platform linux/${{ matrix.arch }} ${{ env.IMAGE }}:cli-${{ needs.resolve-version.outputs.version }} && \
             sudo k3s ctr images tag ${{ env.IMAGE }}:cli-${{ needs.resolve-version.outputs.version }} localhost/nexus-runner:cli-${{ needs.resolve-version.outputs.version }} --force && \
             sudo k3s ctr images tag ${{ env.IMAGE }}:cli-${{ needs.resolve-version.outputs.version }} localhost/nexus-runner:latest --force && \
             sudo k3s ctr images ls | grep nexus-runner"
