name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: build + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test -race ./...

  worm-guard:
    name: worm guard (fresh-dep gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Build the go-gate guard from source (stdlib-only, pinned tag) and fail
      # the build if go.sum introduces any THIRD-PARTY dependency published
      # within the last fortnight that is not in the go-allowance ledger — the
      # Stux-worm CI vector (a PR pulling a fresh malicious dep). Own modules
      # (GOPRIVATE) are skipped; pre-worm deps pass without a ledger entry.
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
      # Self-contained: the guard is a vendored stdlib-only tool in this repo
      # (.github/wormguard, isolated go.mod), so CI needs no cross-repo clone or
      # credential. nexus's deps are all pre-cutoff; when a fresh dep is
      # deliberately approved, pass -allowlist pointing at the synced ledger.
      - name: build wormguard
        run: cd .github/wormguard && GOFLAGS=-mod=mod GOTOOLCHAIN=local go build -o /tmp/wormguard .
      - name: guard go.sum
        run: /tmp/wormguard -gosum go.sum

  security-scan:
    name: security scan
    runs-on: ubuntu-latest
    env:
      GOVULNCHECK_VERSION: v1.3.0
      GOSEC_VERSION: v2.27.1
      GITLEAKS_VERSION: v8.30.1
      OSV_SCANNER_VERSION: v2.3.8
      GOSEC_LEGACY_EXCLUDES: G101,G104,G112,G115,G118,G202,G204,G301,G302,G304,G306,G402,G404,G702,G703,G704,G705
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache: true

      - name: install security scanners
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}
          go install github.com/securego/gosec/v2/cmd/gosec@${GOSEC_VERSION}
          go install github.com/zricethezav/gitleaks/v8@${GITLEAKS_VERSION}
          go install github.com/google/osv-scanner/v2/cmd/osv-scanner@${OSV_SCANNER_VERSION}

      - name: govulncheck
        run: ./scripts/govulncheck-gate.sh

      - name: gosec
        # Existing SAST debt is excluded by rule family so this gate can land
        # and still fail on any unbaselined gosec finding.
        run: gosec -exclude="${GOSEC_LEGACY_EXCLUDES}" ./...

      - name: gitleaks diff scan
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          if [ -z "${BASE_SHA}" ] || [ "${BASE_SHA}" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="$(git rev-list --max-parents=0 "${HEAD_SHA}")"
          fi
          gitleaks git --redact --no-banner --log-opts="${BASE_SHA}..${HEAD_SHA}" .

      - name: osv-scanner
        run: osv-scanner scan source --recursive .
