<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>nexus chat — operator</title>
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --fg: #d8dee4;
    --dim: #6e7681;
    --accent: #6ec1ff;
    --me: #4dffaf;
    --line: #21262d;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 14px;
  }
  body { display: flex; flex-direction: column; }
  header {
    padding: 8px 12px;
    border-bottom: 1px solid var(--line);
    display: flex;
    gap: 12px;
    align-items: center;
    flex-shrink: 0;
    background: var(--panel);
  }
  header input {
    background: var(--bg);
    color: var(--fg);
    border: 1px solid var(--line);
    padding: 4px 6px;
    font-family: inherit;
    font-size: 12px;
    border-radius: 3px;
  }
  header input[name="url"]   { width: 280px; }
  header input[name="token"] { width: 280px; }
  header button {
    background: var(--accent);
    color: var(--bg);
    border: 0;
    padding: 5px 12px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    border-radius: 3px;
  }
  header button:disabled { opacity: 0.5; cursor: default; }
  #status {
    margin-left: auto;
    color: var(--dim);
    font-size: 12px;
  }
  #status.live { color: var(--me); }
  #status.dead { color: #ff6e6e; }
  #log {
    flex: 1;
    overflow-y: auto;
    padding: 8px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .msg {
    padding: 4px 8px;
    border-radius: 3px;
    background: var(--panel);
    border-left: 3px solid var(--line);
    line-height: 1.4;
  }
  .msg.from-operator { border-left-color: var(--me); }
  .msg.from-keel     { border-left-color: var(--accent); }
  .msg.replay        { opacity: 0.6; }
  .msg .meta {
    color: var(--dim);
    font-size: 11px;
    margin-bottom: 2px;
  }
  .msg .from { color: var(--accent); font-weight: bold; }
  .msg .id   { color: var(--dim); }
  .msg .reply{ color: var(--dim); margin-left: 6px; }
  .msg .body { white-space: pre-wrap; word-break: break-word; }
  footer {
    border-top: 1px solid var(--line);
    padding: 8px 12px;
    display: flex;
    gap: 8px;
    flex-shrink: 0;
    background: var(--panel);
  }
  footer textarea {
    flex: 1;
    background: var(--bg);
    color: var(--fg);
    border: 1px solid var(--line);
    padding: 6px 8px;
    font-family: inherit;
    font-size: 13px;
    resize: none;
    border-radius: 3px;
    min-height: 24px;
    max-height: 120px;
  }
  footer button {
    background: var(--me);
    color: var(--bg);
    border: 0;
    padding: 0 16px;
    font-family: inherit;
    font-weight: bold;
    cursor: pointer;
    border-radius: 3px;
  }
  footer button:disabled { opacity: 0.4; cursor: default; }
</style>
</head>
<body>
<header>
  <label>URL <input type="text" name="url" placeholder="ws://host:8001/connect"></label>
  <label>Token <input type="text" name="token" placeholder="NEXUS_TOKEN value"></label>
  <button id="connect">Connect</button>
  <span id="status">disconnected</span>
</header>
<div id="log"></div>
<footer>
  <textarea id="input" placeholder="Type a message — @forge ... or @all etc. Enter to send, Shift+Enter for newline." rows="1"></textarea>
  <button id="send" disabled>Send</button>
</footer>
<script>
"use strict";

// ────────────────────────────────────────────────────────────────────
// Operator-aspect WS client — minimal smoke-test surface for F2.6.
//
// Connects to nexus /connect as role=operator (per the operator-as-
// aspect WS extension spec). Renders inbound chat.deliver frames in
// the log; sends chat.send frames from the input.
//
// Token goes via ?token=... query param because the browser
// WebSocket API can't set the Authorization header on the upgrade.
// The nexus broker accepts both header and query string (header
// wins if both present).
//
// All DOM construction uses textContent / appendChild — no innerHTML
// — so server-supplied content can't smuggle markup.

const $ = (sel) => document.querySelector(sel);
const log = $("#log");
const statusEl = $("#status");
const connectBtn = $("#connect");
const sendBtn = $("#send");
const input = $("#input");
const urlInput = document.querySelector('input[name="url"]');
const tokenInput = document.querySelector('input[name="token"]');

let ws = null;

const SAVED = JSON.parse(localStorage.getItem("nexus-chat-cfg") || "{}");
// Default URL: derive from where this page was served. If chat.html
// was loaded from nexus on host:port, the WS lives on the same
// host:port — so neo loading via http://100.70.156.32:8001/chat.html
// gets a default of ws://100.70.156.32:8001/connect, not
// ws://localhost:8001/connect. Falls back to localhost when opened
// from file:// (saved version).
if (SAVED.url) {
  urlInput.value = SAVED.url;
} else if (location.protocol === "http:" || location.protocol === "https:") {
  const wsScheme = location.protocol === "https:" ? "wss:" : "ws:";
  urlInput.value = wsScheme + "//" + location.host + "/connect";
}
if (SAVED.token) tokenInput.value = SAVED.token;

function setStatus(text, cls) {
  statusEl.textContent = text;
  statusEl.className = cls || "";
  sendBtn.disabled = cls !== "live";
}

function el(tag, className, text) {
  const e = document.createElement(tag);
  if (className) e.className = className;
  if (text != null) e.textContent = text;
  return e;
}

function appendMsg(env) {
  const p = env.payload || {};
  const fromName = String(p.from || "unknown");
  const div = el("div", "msg from-" + fromName.replace(/[^a-z0-9_-]/gi, ""));
  if (p.replay) div.classList.add("replay");

  const meta = el("div", "meta");
  meta.appendChild(el("span", "id", "#" + (p.id != null ? p.id : "?")));
  meta.appendChild(document.createTextNode(" "));
  meta.appendChild(el("span", "from", "@" + fromName));
  if (p.reply_to) {
    meta.appendChild(el("span", "reply", "↳ #" + p.reply_to));
  }
  if (p.replay) {
    meta.appendChild(el("span", "reply", "[replay]"));
  }
  if (p.received_at) {
    meta.appendChild(el("span", "reply", String(p.received_at)));
  }
  div.appendChild(meta);

  div.appendChild(el("div", "body", String(p.content || "")));
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

function appendSystem(text, kind) {
  const div = el("div", "msg", `[${kind}] ${text}`);
  div.style.borderLeftColor = "var(--dim)";
  div.style.opacity = "0.7";
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

function appendOutgoing(content) {
  const div = el("div", "msg from-operator");
  const meta = el("div", "meta");
  meta.appendChild(el("span", "from", "@operator"));
  meta.appendChild(el("span", "reply", "(sent)"));
  div.appendChild(meta);
  div.appendChild(el("div", "body", content));
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

function genID() {
  const ms = Date.now().toString(36);
  const rand = Math.random().toString(36).slice(2, 14);
  return (ms + rand).toUpperCase().padEnd(26, "0").slice(0, 26);
}

function sendChat(content) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  const env = {
    id: genID(),
    kind: "chat.send",
    payload: {
      from: "operator",
      content: content,
    },
  };
  ws.send(JSON.stringify(env));
  appendOutgoing(content);
}

connectBtn.addEventListener("click", () => {
  if (ws) {
    ws.close();
    ws = null;
    setStatus("disconnected", "dead");
    return;
  }
  const url = urlInput.value.trim();
  const token = tokenInput.value.trim();
  if (!url || !token) {
    appendSystem("URL and token both required", "error");
    return;
  }
  localStorage.setItem("nexus-chat-cfg", JSON.stringify({ url, token }));

  const wsUrl = url + (url.includes("?") ? "&" : "?") + "token=" + encodeURIComponent(token);
  setStatus("connecting…", "");
  try {
    ws = new WebSocket(wsUrl);
  } catch (e) {
    appendSystem("WebSocket constructor failed: " + e.message, "error");
    setStatus("disconnected", "dead");
    return;
  }

  ws.onopen = () => {
    setStatus("connecting (sending register)", "");
    const reg = {
      id: genID(),
      kind: "register",
      payload: {
        name: "operator",
        role: "operator",
        context_mode: "global",
        provider: "human",
        port: 0,
        capabilities: ["operator-ui"],
        home: "(browser)",
        session_id: genID(),
        started_at: new Date().toISOString(),
      },
    };
    ws.send(JSON.stringify(reg));
  };

  ws.onmessage = (evt) => {
    let env;
    try { env = JSON.parse(evt.data); }
    catch (e) {
      appendSystem("bad frame: " + String(evt.data).slice(0, 80), "warn");
      return;
    }
    if (env.kind === "register.ack") {
      setStatus("live", "live");
      appendSystem("registered as operator", "info");
      return;
    }
    if (env.kind === "chat.deliver") {
      appendMsg(env);
      return;
    }
    if (env.kind === "result") {
      const p = env.payload || env;
      if (p.status && p.status >= 400) {
        appendSystem("error " + p.status + ": " + (p.error || ""), "error");
      }
      return;
    }
    appendSystem("unhandled kind=" + env.kind, "info");
  };

  ws.onerror = () => {
    appendSystem("WebSocket error (see browser console)", "error");
  };

  ws.onclose = (evt) => {
    setStatus(`disconnected (code=${evt.code} reason=${evt.reason || "none"})`, "dead");
    ws = null;
  };
});

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    const content = input.value.trim();
    if (!content) return;
    sendChat(content);
    input.value = "";
  }
});

sendBtn.addEventListener("click", () => {
  const content = input.value.trim();
  if (!content) return;
  sendChat(content);
  input.value = "";
});

setStatus("disconnected", "dead");
</script>
</body>
</html>
