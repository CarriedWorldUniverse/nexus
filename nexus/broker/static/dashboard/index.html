  <script>
    // Restore font-mono choice before first paint to avoid FOUC
    try {
      const saved = localStorage.getItem('font_mono');
      if (saved) document.documentElement.dataset.fontMono = saved;
    } catch {}
    window.__setFontMono = function(name) {
      if (name) {
        document.documentElement.dataset.fontMono = name;
        localStorage.setItem('font_mono', name);
      } else {
        delete document.documentElement.dataset.fontMono;
        localStorage.removeItem('font_mono');
      }
    };
  </script>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { h, render } from '/js/vendor/preact.js';
    import { useEffect, useState, useRef } from '/js/vendor/preact-hooks.js';
    import { signal } from '/js/vendor/preact-signals.js';
    import htm from '/js/vendor/htm.js';

    const html = htm.bind(h);

    window.__preact = { h, render, signal, html, useEffect, useState, useRef };

    const { App } = await import('./js/app.js');
    render(h(App, null), document.getElementById('app'));
  </script>
</body>
</html>
