<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0a0b0e"/>
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="12" stroke="#e94560" stroke-width="0.4" fill="none" opacity="0.15"/>
  <!-- Inner ring -->
  <circle cx="16" cy="16" r="7" stroke="#e94560" stroke-width="0.6" fill="none" opacity="0.25"/>
  <!-- Cardinal threads -->
  <line x1="16" y1="3" x2="16" y2="9" stroke="#e94560" stroke-width="1.2" opacity="0.6"/>
  <line x1="16" y1="23" x2="16" y2="29" stroke="#e94560" stroke-width="1.2" opacity="0.6"/>
  <line x1="3" y1="16" x2="9" y2="16" stroke="#e94560" stroke-width="1.2" opacity="0.6"/>
  <line x1="23" y1="16" x2="29" y2="16" stroke="#e94560" stroke-width="1.2" opacity="0.6"/>
  <!-- Diagonal threads -->
  <line x1="6.5" y1="6.5" x2="11.5" y2="11.5" stroke="#e94560" stroke-width="0.8" opacity="0.3"/>
  <line x1="20.5" y1="20.5" x2="25.5" y2="25.5" stroke="#e94560" stroke-width="0.8" opacity="0.3"/>
  <line x1="25.5" y1="6.5" x2="20.5" y2="11.5" stroke="#e94560" stroke-width="0.8" opacity="0.3"/>
  <line x1="11.5" y1="20.5" x2="6.5" y2="25.5" stroke="#e94560" stroke-width="0.8" opacity="0.3"/>
  <!-- Outer nodes -->
  <circle cx="16" cy="3" r="1.5" fill="#e94560" opacity="0.6"/>
  <circle cx="16" cy="29" r="1.5" fill="#e94560" opacity="0.6"/>
  <circle cx="3" cy="16" r="1.5" fill="#e94560" opacity="0.6"/>
  <circle cx="29" cy="16" r="1.5" fill="#e94560" opacity="0.6"/>
  <!-- Central node -->
  <circle cx="16" cy="16" r="3.5" fill="#e94560" opacity="0.9"/>
  <circle cx="16" cy="16" r="2" fill="#0a0b0e"/>
  <circle cx="16" cy="16" r="1" fill="#e94560"/>
</svg>
