apiVersion: v1
kind: ServiceAccount
metadata:
  name: dispatch-controller
  namespace: nexus
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dispatch-controller
  namespace: nexus
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dispatch-controller
  namespace: nexus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dispatch-controller
subjects:
  - kind: ServiceAccount
    name: dispatch-controller
    namespace: nexus
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dispatch-controller
  namespace: nexus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dispatch-controller
  template:
    metadata:
      labels:
        app: dispatch-controller
    spec:
      serviceAccountName: dispatch-controller
      hostAliases:
        - ip: "192.168.143.133"
          hostnames: ["dmonextreme.tail41686e.ts.net"]
      containers:
        - name: controller
          image: localhost/dispatch-controller:dev
          imagePullPolicy: Never
          args:
            - "-k"
            - "/etc/nexus/keyfile.json"
            - "-namespace"
            - "nexus"
            - "-max-concurrent"
            - "4"
          volumeMounts:
            - name: keyfile
              mountPath: /etc/nexus
              readOnly: true
      volumes:
        - name: keyfile
          secret:
            secretName: aspect-keyfile-dispatch-controller
