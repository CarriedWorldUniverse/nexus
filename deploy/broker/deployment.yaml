# nexus broker (NEX-457) — pure routing/dispatch/admin hub. No embedded Frame
# (removed NEX-456); DB via sqld (NEX-455 libSQL DSN). Replaces host nexus.service.
#
# The broker is TLS-always (it refuses to start without a cert/key). So the pod
# carries its own tailnet identity via a tailscaled sidecar (kernel mode, tagged
# tag:nexus) that joins as `nexus` and provisions the Let's Encrypt cert with
# `tailscale cert`. The broker mounts that cert and terminates its own TLS.
# All three containers share the pod network namespace, so the broker's :7888
# is reachable at nexus.tail41686e.ts.net:7888 over the tailnet. In-cluster
# aspects reach it via the ClusterIP Service (nexus-broker.nexus.svc:7888).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-broker
  namespace: nexus
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: nexus-broker
  template:
    metadata:
      labels:
        app: nexus-broker
    spec:
      containers:
        # 1. Tailnet identity (kernel mode so the broker's listening port is
        #    transparently reachable on the tailnet IP in the shared netns).
        - name: tailscale
          image: ghcr.io/tailscale/tailscale:stable
          env:
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: tailscale-auth
                  key: TS_AUTHKEY
            - name: TS_HOSTNAME
              value: "nexus"
            - name: TS_USERSPACE
              value: "false"
            - name: TS_STATE_DIR
              value: /var/lib/tailscale
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
          volumeMounts:
            - { name: ts-sock, mountPath: /var/run/tailscale }
            - { name: ts-state, mountPath: /var/lib/tailscale }
        # 2. Cert provisioner: waits for tailscaled, then keeps a fresh LE cert
        #    for nexus.tail41686e.ts.net in the shared cert volume.
        - name: tailscale-cert
          image: ghcr.io/tailscale/tailscale:stable
          command: ["/bin/sh", "-c"]
          args:
            - |
              S=/var/run/tailscale/tailscaled.sock
              until tailscale --socket=$S status >/dev/null 2>&1; do echo "wait tailscaled"; sleep 3; done
              while true; do
                tailscale --socket=$S cert \
                  --cert-file=/certs/tls.crt --key-file=/certs/tls.key \
                  nexus.tail41686e.ts.net || { echo "cert failed; retry"; sleep 30; continue; }
                echo "cert ok; sleep 12h"; sleep 43200
              done
          volumeMounts:
            - { name: ts-sock, mountPath: /var/run/tailscale }
            - { name: ts-certs, mountPath: /certs }
        # 3. The broker. Waits for the cert, then serves TLS on :7888.
        - name: broker
          image: localhost/nexus-broker:dev
          imagePullPolicy: Never
          command: ["/bin/sh", "-c"]
          args:
            - |
              until [ -s /certs/tls.crt ] && [ -s /certs/tls.key ]; do echo "wait cert"; sleep 3; done
              exec /usr/local/bin/nexus -addr :7888 \
                -data-dir /var/lib/nexus \
                -tls-cert /certs/tls.crt -tls-key /certs/tls.key \
                -aspect-dir /var/lib/nexus/aspects
          env:
            - name: NEXUS_DATA_DIR
              value: /var/lib/nexus
            - name: NEXUS_ASPECT_DIR
              value: /var/lib/nexus/aspects
            # libSQL DSN → sqld platform service in the cwb namespace (NEX-455).
            - name: NEXUS_DB_DSN
              value: "http://sqld.cwb.svc.cluster.local:8080"
          envFrom:
            # NEXUS_TOKEN / NEXUS_AUTH_BYPASS / NEXUS_OPERATOR_RPID — created at
            # cutover from the host /etc/nexus/nexus.env (claude.env is dropped).
            - secretRef:
                name: nexus-broker-env
          ports:
            - { name: broker, containerPort: 7888 }
          volumeMounts:
            - { name: ts-certs, mountPath: /certs, readOnly: true }
            - { name: data, mountPath: /var/lib/nexus }
      volumes:
        - { name: ts-sock, emptyDir: {} }
        - { name: ts-state, emptyDir: {} }
        - { name: ts-certs, emptyDir: {} }
        - name: data
          persistentVolumeClaim:
            claimName: nexus-broker-data
---
# In-cluster reach for pod-aspects (the dispatch-native endgame): cluster DNS
# nexus-broker.nexus.svc:7888. External/remote aspects + the operator UI reach
# the broker over the tailnet at nexus.tail41686e.ts.net:7888 (the sidecar).
apiVersion: v1
kind: Service
metadata:
  name: nexus-broker
  namespace: nexus
spec:
  type: ClusterIP
  selector:
    app: nexus-broker
  ports:
    - { name: broker, port: 7888, targetPort: 7888 }
---
# Aspect-dir + on-disk broker state (the DB itself lives in sqld). Seeded at
# cutover from the host /var/lib/nexus/aspects (~134M).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nexus-broker-data
  namespace: nexus
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
