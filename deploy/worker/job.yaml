# Builder Job template (NEX-436). Substitute ${AGENT} / ${TASK_ID} at apply
# (envsubst). M3's dispatch controller will create this programmatically;
# for M2 it's applied by hand to run a builder for a dispatched brief.
#
# Runs agentfunnel in -builder mode AS the named agent: validate → drain the
# pending inbox brief once → run the task → push (via cw) + open the PR as
# that agent → post the result → exit on task_done.
apiVersion: batch/v1
kind: Job
metadata:
  name: builder-${AGENT}-${TASK_ID}
  namespace: nexus
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: Never
      # The broker is a k3s pod (NEX-457) reachable on the tailnet at
      # nexus.tail41686e.ts.net:7888. In-cluster, map that name to the broker's
      # pinned ClusterIP so it resolves AND the broker's LE cert (CN=nexus.tail…)
      # validates — no tailscale on the worker.
      hostAliases:
        - ip: "10.43.138.250"              # nexus-broker pinned ClusterIP
          hostnames: ["nexus.tail41686e.ts.net"]
      containers:
        - name: builder
          image: localhost/nexus-builder:dev
          imagePullPolicy: Never            # imported into k3s containerd
          args: ["-k", "/etc/nexus/keyfile.json", "-builder"]
          env:
            # M1 custodian seam (the pod broker). The cw git-credential
            # helper + provider keys resolve through this.
            - { name: CW_SEAM_URL, value: "https://nexus.tail41686e.ts.net:7888" }
            - { name: GOCACHE, value: "/cache/go" }
            # codex auth in-pod: prefer OPENAI_API_KEY brokered via the seam
            # (kind=provider). See README — codex-pod-auth is the open item.
          volumeMounts:
            - { name: work, mountPath: /work }
            - { name: cache, mountPath: /cache }
            - { name: keyfile, mountPath: /etc/nexus, readOnly: true }
      volumes:
        - { name: work, persistentVolumeClaim: { claimName: nexus-builder-work } }
        - { name: cache, persistentVolumeClaim: { claimName: nexus-builder-work } }
        - { name: keyfile, secret: { secretName: aspect-keyfile-${AGENT} } }
