{{- if gt (int .Values.port) 0 -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hosted-service.name" . }}
  namespace: {{ include "hosted-service.namespace" . }}
  labels:
{{ include "hosted-service.labels" . | indent 4 }}
spec:
  type: ClusterIP
  selector:
{{ include "hosted-service.selectorLabels" . | indent 4 }}
  ports:
    - name: http
      port: {{ .Values.port }}
      targetPort: {{ .Values.port }}
      protocol: TCP
{{- end }}
