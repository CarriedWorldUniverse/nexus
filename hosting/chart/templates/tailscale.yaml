{{- if and .Values.tailnetEdge (gt (int .Values.port) 0) -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hosted-service.name" . }}-tailnet
  namespace: {{ include "hosted-service.namespace" . }}
  labels:
{{ include "hosted-service.labels" . | indent 4 }}
  {{- if .Values.tailnetName }}
  annotations:
    tailscale.com/hostname: {{ .Values.tailnetName | quote }}
  {{- end }}
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  selector:
{{ include "hosted-service.selectorLabels" . | indent 4 }}
  ports:
    - name: http
      port: {{ .Values.port }}
      targetPort: {{ .Values.port }}
      protocol: TCP
{{- end }}
